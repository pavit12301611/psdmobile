[build]
  functions = "netlify/functions"
  publish = "."

[dev]
  port = 8888

[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/:splat"
  status = 200

[[redirects]]
  from = "/admin"
  to = "/admin/index.html"
  status = 200

[functions]
  node_bundler = "esbuild"
  external_node_modules = ["mongodb"]
